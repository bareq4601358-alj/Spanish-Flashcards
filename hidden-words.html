<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hidden vocabulary</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter">Hidden vocabulary</h1>
        <p class="subtitle subtitleTight desktopOnlyControl">
          <kbd>←</kbd> flip · <kbd>→</kbd> flip then next · <strong>Retrieve</strong> puts this word back into your main
          vocabulary deck.
        </p>
        <div class="stats statsRow" aria-label="Hidden words">
          <div class="stat">
            <div class="statLabel">Hidden</div>
            <div class="statValue" id="statTotal">—</div>
          </div>
          <div class="stat">
            <div class="statLabel">#</div>
            <div class="statValue" id="statPosition">—</div>
          </div>
          <a class="btn ghost btnSm" href="./hidden.html">All hidden</a>
          <a class="btn ghost btnSm" href="./index.html">Main deck</a>
          <button class="btn primary btnSm" id="retrieveBtn" type="button">Retrieve</button>
          <button class="btn navBtn primary btnSm desktopOnlyControl" id="stepBtn" type="button">Flip ▸</button>
        </div>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="Hidden vocabulary cards">
          <p class="studyHint muted studyHintSolo desktopOnlyControl" id="studyHint">Loading…</p>

          <div class="studyTouchBar" role="group" aria-label="Flip and next">
            <button type="button" class="btn ghost" id="flipSideBtn">Flip</button>
            <button type="button" class="btn navBtn primary" id="nextCardBtn">Next</button>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="Flashcard — click to flip"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                  <div class="flashFace flashFaceFront">
                    <span class="flashLabel">English</span>
                    <p class="flashWord flashWordFront" id="textEn">—</p>
                    <span class="flashCornerTag" id="cornerTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel">Spanish</span>
                    <p class="flashWord flashWordEs" id="textEs">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

          <div class="miniHelp miniHelpDesktopOnly">
            <div class="keyboardHelpBlock">
              <span class="muted">Flip with the card or ← · Next with → · Restore with Retrieve</span>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="./wordbank.js" defer></script>
    <script src="./hidden-words.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
  </body>
</html>
