<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Topic · English · Spanish Flashcards</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter" id="topicStudyHeading">Topic study</h1>
        <p class="subtitle subtitleTight desktopOnlyControl" id="topicStudySubtitle">
          Subset of your main deck by topic. Full deck is unchanged on
          <a class="muted inlineLink" href="./index.html">Main deck</a>.
        </p>
        <div class="stats statsRow" aria-label="Deck">
          <div class="stat">
            <div class="statLabel">In topic</div>
            <div class="statValue" id="statDeck">—</div>
          </div>
          <a class="stat statLink" href="./saved.html" title="Open saved vocabulary deck">
            <div class="statLabel">Saved</div>
            <div class="statValue" id="statSaved">—</div>
          </a>
          <a class="stat statLink" href="./hidden.html" title="View or restore hidden vocabulary">
            <div class="statLabel">Hidden</div>
            <div class="statValue" id="statRemoved">—</div>
          </a>
          <button class="btn ghost btnSm" id="saveBtn" type="button" title="Keyboard shortcut: S" aria-label="Save to memory bank; keyboard shortcut S">
            Save
          </button>
          <a class="btn ghost btnSm" href="./index.html">Main</a>
          <a class="btn ghost btnSm" href="./topics.html">Topics</a>
          <a class="btn ghost btnSm" href="./matching.html">Matching</a>
          <a class="btn ghost btnSm" href="./phrases.html">Sentences</a>
          <a class="btn ghost btnSm" href="./writing.html">Writing</a>
          <a class="btn ghost btnSm" href="./saved.html">Saved deck</a>
          <button
            class="btn danger btnSm"
            id="hideCardBtn"
            type="button"
            title="Remove this word from your main deck on this browser"
          >
            Hide card
          </button>
        </div>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="Topic study">
          <div class="studyRow" role="group" aria-label="Flip and next">
            <button class="btn navBtn primary desktopOnlyControl" id="stepBtn" type="button">Flip ▸</button>
            <div class="studyTouchBar">
              <button type="button" class="btn ghost" id="flipSideBtn">Flip</button>
              <button type="button" class="btn navBtn primary" id="nextCardBtn">Next</button>
            </div>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="Flashcard — click to flip"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                  <div class="flashFace flashFaceFront">
                    <span class="flashLabel">English</span>
                    <p class="flashWord flashWordFront" id="textEn">—</p>
                    <span class="flashCornerTag" id="deckTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel">Spanish</span>
                    <p class="flashWord flashWordEs" id="textEs">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

          <div class="miniHelp" id="toastBar">
            <span id="saveToast" class="saveToast" aria-live="polite"></span>
          </div>
        </section>
      </section>
    </main>

    <script src="./topics-data.js"></script>
    <script src="./english-display.js"></script>
    <script src="./wordbank.js" defer></script>
    <script src="./topic-main.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
  </body>
</html>
